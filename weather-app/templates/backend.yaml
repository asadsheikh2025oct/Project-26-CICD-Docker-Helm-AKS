apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: weather-backend
  template:
    metadata:
      labels:
        app: weather-backend
    spec:
      containers:
      - name: backend-container
        image: {{ .Values.registry }}/{{ .Values.backend.image }}:{{ .Values.backend.tag }}
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: weather-backend-service
spec:
  selector:
    app: weather-backend
  ports:
    - protocol: TCP
      port: 80       # The port the Frontend will call
      targetPort: 8080 # The port the Backend app is listening on
  type: LoadBalancer